services:
  consultation-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consultation-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3010
    ports:
      - "3010:3010"
    networks:
      - npm_default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  npm_default:
    external: true
